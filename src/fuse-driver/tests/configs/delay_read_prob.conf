# NAS Emulator FUSE Probabilistic Delay Test Configuration
# 50% probability of 300ms delay on read operations

# Basic Settings
mount_point = ${NAS_MOUNT_POINT}
storage_path = ${NAS_STORAGE_PATH}
log_file = ${NAS_LOG_FILE}
log_level = 3  # DEBUG level for detailed logs

# Fault Injection Master Switch
enable_fault_injection = true

# Delay Fault Configuration - PROBABILISTIC on READ
[delay_fault]
probability = 0.5     # 50% probability of triggering
delay_ms = 300        # 300ms delay per operation
operations = read     # Only affect read operations

# Explicitly disable all other fault types
[error_fault]
probability = 0.0     # Disabled

[corruption_fault]
probability = 0.0     # Disabled

[timing_fault]
enabled = false       # Disabled

[operation_count_fault]
enabled = false       # Disabled

[partial_fault]
probability = 0.0     # Disabled
