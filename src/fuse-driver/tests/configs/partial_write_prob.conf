# NAS Emulator FUSE Probabilistic Partial Write Test Configuration
# 50% probability of partial writes with factor 0.5

# Basic Settings
mount_point = ${NAS_MOUNT_POINT}
storage_path = ${NAS_STORAGE_PATH}
log_file = ${NAS_LOG_FILE}
log_level = 3  # DEBUG level for detailed logs

# Fault Injection Master Switch
enable_fault_injection = true

# Partial Fault Configuration - PROBABILISTIC WRITE
[partial_fault]
probability = 0.5     # 50% probability of triggering
factor = 0.5          # Write only 50% of the data when triggered
operations = write    # Only affect write operations

# Explicitly disable all other fault types
[error_fault]
probability = 0.0     # Disabled

[corruption_fault]
probability = 0.0     # Disabled

[delay_fault]
probability = 0.0     # Disabled

[timing_fault]
enabled = false       # Disabled

[operation_count_fault]
enabled = false       # Disabled
